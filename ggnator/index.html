<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#091E4A">

<title>GGnator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ────────────────────────────────────────────────────────────────
   GGNATOR · doubles every lone G, and that's all it does.
   Family design language: plain light page, navy-deep header bar,
   condensed uppercase labels, hard offset shadows. Kept minimal.
   ──────────────────────────────────────────────────────────────── */

:root {
  --navy-deep:   #091E4A;
  --navy-mid:    #1A4A96;
  --steel:       #3A6EA8;
  --chalk:       #E4EDF7;
  --chalk-dark:  #C0D2E8;
  --gold:        #C8A84B;
  --text-primary:#0D2F6E;
  --text-body:   #1A3A6A;
  --text-muted:  #5070A0;
  --text-navy-dim:#7A9ACA;
  --radius:      2px;
  --card-bg:     #FFFFFF;
  --card-border: #C0D2E8;
  --flame-yellow: #FFD23F;
  --flame-deep:   #7A0D0D;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  background: var(--chalk);
  color: var(--text-body);
  min-height: 100vh;
}

/* ── HEADER — the family bar ── */
.app-header {
  background: var(--navy-deep);
  background-image:
    linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.4) 100%);
  border-bottom: 1px solid rgba(0,0,0,0.55);
  box-shadow:
    inset 0 -1px 0 rgba(255,210,63,0.08),
    inset 0 -4px 12px rgba(0,0,0,0.55);
  padding: 12px 24px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  min-height: 56px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  margin-left: -14px;
  color: rgba(255, 210, 63, 0.6);
  text-decoration: none;
  justify-self: start;
  transition: color 0.12s, transform 0.08s, filter 0.12s;
}
.back-btn:hover,
.back-btn:focus-visible {
  color: var(--flame-yellow);
  transform: translate(-1px, -1px);
  filter: drop-shadow(0 0 8px rgba(255, 210, 63, 0.45));
}
.back-btn:active { transform: translate(1px, 1px); }
.back-btn:focus-visible { outline: 2px solid var(--flame-yellow); outline-offset: 2px; }
.back-btn svg { width: 22px; height: 22px; shape-rendering: crispEdges; }
.back-btn:hover svg,
.back-btn:focus-visible svg { animation: back-nudge 0.6s ease-in-out infinite; }
@keyframes back-nudge {
  0%, 100% { transform: translate(0, 0); }
  50%      { transform: translate(-2px, -2px); }
}

.app-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 21px;
  font-weight: 700;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: #E8F0FB;
  white-space: nowrap;
  padding-left: 7px;   /* optically recentre the trailing letter-space */
}

/* ── MAIN ── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.panel {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  margin-bottom: 22px;
}
.panel-head {
  background: var(--navy-deep);
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.panel-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-navy-dim);
}

textarea {
  display: block;
  width: 100%;
  min-height: 150px;
  padding: 14px;
  border: none;
  resize: vertical;
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  line-height: 1.55;
  color: var(--text-primary);
  background: transparent;
}
textarea:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: -2px; }
textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
#output { color: var(--text-body); }

.copy-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid rgba(255, 210, 63, 0.4);
  color: rgba(255, 210, 63, 0.75);
  padding: 3px 10px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: border-color 0.12s, color 0.12s, background 0.12s;
}
.copy-btn:hover,
.copy-btn:focus-visible {
  border-color: var(--flame-yellow);
  color: var(--flame-yellow);
  background: rgba(255, 210, 63, 0.08);
}
.copy-btn:focus-visible { outline: 2px solid var(--flame-yellow); outline-offset: 2px; }

.tally {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
</style>
</head>
<body>

<header class="app-header" role="banner">
  <a class="back-btn" href="../index.html" aria-label="Back to the GG IT Toolbox">
    <svg viewBox="0 0 12 12" aria-hidden="true">
      <rect x="0" y="0" width="6" height="2" fill="currentColor"/>
      <rect x="0" y="0" width="2" height="6" fill="currentColor"/>
      <rect x="2" y="2" width="2" height="2" fill="currentColor"/>
      <rect x="4" y="4" width="2" height="2" fill="currentColor"/>
      <rect x="6" y="6" width="2" height="2" fill="currentColor"/>
      <rect x="8" y="8" width="2" height="2" fill="currentColor"/>
    </svg>
  </a>
  <h1 class="app-title">GGnator</h1>
  <span></span>
</header>

<main>
  <div class="panel">
    <div class="panel-head">
      <span class="panel-label">Your text</span>
    </div>
    <label class="sr-only" for="input">Text to GGnate</label>
    <textarea id="input" placeholder="Type or paste text&hellip;" autofocus spellcheck="false"></textarea>
  </div>

  <div class="panel">
    <div class="panel-head">
      <span class="panel-label">GGnated</span>
      <button class="copy-btn" id="copy" type="button">Copy</button>
    </div>
    <label class="sr-only" for="output">GGnated result</label>
    <textarea id="output" readonly placeholder="&hellip;and out it comes, twice as GG."></textarea>
  </div>

  <p class="tally" id="tally" aria-live="polite"></p>
</main>

<script>
'use strict';

/* Double every lone G (case kept: g→gg, G→GG). Runs of two or more G's are
   already GG enough and pass through as-is. URLs, www-links and email
   addresses are never touched, so links keep working. */
const LINK_RE = /(https?:\/\/\S+|www\.\S+|\S+@\S+\.\S+)/gi;

function ggnate(text) {
  return text
    .split(LINK_RE)
    .map((part, i) => i % 2
      ? part                                                    // a link — keep intact
      : part.replace(/g+/gi, m => m.length === 1 ? m + m : m))  // lone g → doubled
    .join('');
}

const input  = document.getElementById('input');
const output = document.getElementById('output');
const tally  = document.getElementById('tally');

function run() {
  const src = input.value;
  output.value = ggnate(src);
  const gained = output.value.length - src.length;
  tally.textContent = gained > 0 ? '+' + gained + " G" + (gained === 1 ? '' : "'s") + ' gained' : '';
}
input.addEventListener('input', run);

document.getElementById('copy').addEventListener('click', async () => {
  if (!output.value) return;
  try { await navigator.clipboard.writeText(output.value); }
  catch (e) { output.select(); document.execCommand('copy'); }
  const btn = document.getElementById('copy');
  const old = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = old; }, 1200);
});
</script>

</body>
</html>
