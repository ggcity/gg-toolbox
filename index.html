<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ── SECURITY HEADERS ── -->
<!-- Strict CSP. 'unsafe-inline' is required only because all CSS/JS is inline by design.
     For maximum hardening, extract styles/scripts to external files with nonces or hashes.
     frame-ancestors must be set as an HTTP header at the server (cannot be set via meta). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#091E4A">

<title>GG IT Toolbox</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
/* ────────────────────────────────────────────────────────────────
   GG IT TOOLBOX · launcher
   Shares the family design language of the Imagge Compressor and
   QR GGenerator: plain light page, navy-deep header bar,
   condensed uppercase labels, hard offset shadows.
   ──────────────────────────────────────────────────────────────── */

:root {
  --navy:        #0D2F6E;
  --navy-deep:   #091E4A;
  --navy-mid:    #1A4A96;
  --steel:       #3A6EA8;
  --ice:         #F0F5FB;
  --chalk:       #E4EDF7;
  --chalk-dark:  #C0D2E8;
  --gold:        #C8A84B;
  --gold-deep:   #7A5E10;
  --text-primary:#0D2F6E;
  --text-body:   #1A3A6A;
  --text-muted:  #5070A0;
  --text-navy:   #E8F0FB;
  --text-navy-dim:#7A9ACA;
  --success:     #1A5E38;
  --radius:      2px;
  --page-bg:     #E4EDF7;
  --card-bg:     #FFFFFF;
  --card-border: #C0D2E8;

  /* FLAMING CHEETOS — shared accent */
  --flame-yellow: #FFD23F;
  --flame-orange: #FF7A18;
  --flame-deep:   #7A0D0D;
  --flame-ink:    #1A0606;

  --app-size: 148px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  background: var(--page-bg);   /* plain — no gradients, no scanlines */
  color: var(--text-body);
  min-height: 100vh;
  padding-bottom: 60px;
}

svg { image-rendering: pixelated; shape-rendering: crispEdges; }

/* ── SKIP LINK ── */
.skip-link {
  position: absolute; top: -52px; left: 0;
  background: var(--navy-deep); color: var(--flame-yellow);
  border: 2px solid var(--flame-yellow);
  padding: 0.75rem 1rem; z-index: 1000; text-decoration: none; font-weight: 700;
}
.skip-link:focus { top: 0; }

/* ── HEADER — same bar as the Compressor / QR GGenerator ── */
.app-header {
  background: var(--navy-deep);
  background-image:
    linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.4) 100%);
  border-bottom: 1px solid rgba(0,0,0,0.55);
  box-shadow:
    inset 0 -1px 0 rgba(255,210,63,0.08),
    inset 0 -4px 12px rgba(0,0,0,0.55);
  padding: 12px 24px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  min-height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left   { display: flex; align-items: center; gap: 10px; }
.header-center { display: flex; align-items: center; justify-content: center; }
.header-right  { display: flex; align-items: center; justify-content: flex-end; }

.brand-email-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  background: transparent;
  border: 2px solid rgba(255, 210, 63, 0.35);
  color: rgba(255, 210, 63, 0.65);
  box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  text-decoration: none; flex-shrink: 0;
  transition: border-color 0.12s, color 0.12s, background 0.12s, transform 0.08s, box-shadow 0.08s;
}
.brand-email-btn:hover,
.brand-email-btn:focus-visible {
  border-color: var(--flame-yellow);
  color: var(--flame-yellow);
  background: rgba(255, 210, 63, 0.08);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--flame-deep), 0 0 10px rgba(255,210,63,0.2);
}
.brand-email-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--flame-deep); }
.brand-email-btn:focus-visible { outline: 2px solid var(--flame-yellow); outline-offset: 3px; }
.brand-email-btn svg { width: 16px; height: 12px; }

/* Title — refined condensed caps */
.app-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 21px;
  font-weight: 700;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--text-navy);
  white-space: nowrap;
  padding-left: 7px;   /* optically recentre: offsets the trailing letter-space */
}

/* Clock — quiet tabular time */
.header-clock {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--text-navy-dim);
  font-variant-numeric: tabular-nums;
}

/* ── DESKTOP AREA ── */
.desktop {
  padding: 48px 32px 100px;
}

/* ── APP GRID ── */
.app-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: flex-start;
}

/* ── APP TILE — white card, navy icon screen, gold hard-shadow hover ── */
.app-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  width: var(--app-size);
  outline: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  transition: border-color 0.12s, transform 0.1s, box-shadow 0.12s;
}
.app-icon:hover,
.app-icon:focus-visible {
  border-color: var(--gold);
  transform: translate(-2px, -2px);
  box-shadow: 4px 4px 0 var(--gold);
}
.app-icon:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: 3px; }
.app-icon:active {
  transform: translate(0, 0);
  box-shadow: 1px 1px 0 var(--gold);
}

.app-box {
  width: calc(var(--app-size) - 18px);
  height: calc(var(--app-size) - 18px);
  margin: 9px 9px 6px;
  background: linear-gradient(160deg, #0B2554 0%, var(--navy-deep) 100%);
  border: 1px solid var(--navy-deep);
  border-radius: var(--radius);
  display: grid;
  place-items: center;
  position: relative;
}

.app-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-primary);
  text-align: center;
  line-height: 1.25;
  padding: 2px 8px 10px;
}

/* Selected state (click feedback while navigating) */
.app-icon.selected { border-color: var(--gold); box-shadow: 3px 3px 0 var(--gold); }

/* ── "NEW" STAMP BADGE ── */
.new-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--flame-yellow);
  color: var(--flame-ink);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 5px 7px 4px;
  letter-spacing: 1.5px;
  box-shadow: 2px 2px 0 var(--flame-deep);
  z-index: 3;
  pointer-events: none;
  transform: rotate(4deg);
}


/* ── IMAGE COMPRESSOR HOVER ANIMATION ──
   Screen background stays static; only the picture content compresses
   around its centre while the corner arrows squeeze inward. */
@keyframes ic-compress-content {
  0%   { transform: scale(1); }
  35%  { transform: scale(0.5); }
  60%  { transform: scale(0.5); }
  78%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
@keyframes ic-arrow-tl {
  0%   { transform: translate(0, 0); }
  35%  { transform: translate(2px, 2px); }
  60%  { transform: translate(2px, 2px); }
  78%  { transform: translate(-0.4px, -0.4px); }
  100% { transform: translate(0, 0); }
}
@keyframes ic-arrow-br {
  0%   { transform: translate(0, 0); }
  35%  { transform: translate(-2px, -2px); }
  60%  { transform: translate(-2px, -2px); }
  78%  { transform: translate(0.4px, 0.4px); }
  100% { transform: translate(0, 0); }
}
.app-icon[data-app="image-compressor"]:hover .ic-content,
.app-icon[data-app="image-compressor"]:focus-visible .ic-content {
  transform-origin: 50% 50%;
  transform-box: fill-box;
  animation: ic-compress-content 1.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}
.app-icon[data-app="image-compressor"]:hover .ic-arrow-tl,
.app-icon[data-app="image-compressor"]:focus-visible .ic-arrow-tl {
  animation: ic-arrow-tl 1.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}
.app-icon[data-app="image-compressor"]:hover .ic-arrow-br,
.app-icon[data-app="image-compressor"]:focus-visible .ic-arrow-br {
  animation: ic-arrow-br 1.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}

/* ── PLACEHOLDER (suggest a tool) ── */
.app-icon.placeholder,
.app-icon.placeholder:hover,
.app-icon.placeholder:focus-visible,
.app-icon.placeholder:active {
  background: transparent;
  box-shadow: none;
  transform: none;
}
.app-icon.placeholder {
  border: 2px dashed var(--chalk-dark);
  min-height: var(--app-size);
  justify-content: center;
  transition: border-color 0.15s;
}
.app-icon.placeholder .app-box {
  background: none;
  border: none;
  margin: 0;
}
.app-icon.placeholder:hover,
.app-icon.placeholder:focus-visible { border-color: var(--gold); }
.app-icon.placeholder:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: 3px; }

.pixel-plus { width: 32px; height: 32px; }
.pixel-plus rect { fill: var(--chalk-dark); transition: fill 0.15s; }
.app-icon.placeholder:hover .pixel-plus rect,
.app-icon.placeholder:focus-visible .pixel-plus rect { fill: var(--gold); }
.app-icon.placeholder:hover .pixel-plus,
.app-icon.placeholder:focus-visible .pixel-plus {
  animation: plus-pulse 0.55s steps(1) infinite;
}
@keyframes plus-pulse {
  0%   { opacity: 1; }
  50%  { opacity: 0.45; }
  100% { opacity: 1; }
}

/* ── SNACK SHACK — a little desk drawer that rises out of the footer ── */
.toybox {
  position: fixed;
  right: 18px;
  bottom: 32px;               /* seated on top of the footer bar */
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 90;                /* below the footer (100): it emerges from it */
  /* closed: sunk into the footer, only the handle poking up */
  transform: translateY(calc(100% - 26px));
  transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.3, 1);
}
.toybox.open { transform: translateY(0); }
.toybox.dragging { transition: none; }

.toybox-handle {
  width: 76px;
  height: 26px;
  background: var(--navy-deep);
  border: 1px solid var(--gold);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
  touch-action: none;
  box-shadow: -2px -2px 0 rgba(9, 30, 74, 0.15);
}
.toybox-handle:active { cursor: grabbing; }
.toybox-handle:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: 2px; }
.toybox-handle svg {
  width: 40px;
  height: 12px;
  pointer-events: none;
}
/* "pull me" wiggle while closed */
.toybox:not(.open):not(.dragging) .toybox-handle:hover { animation: toy-pull 0.8s ease-in-out infinite; }
@keyframes toy-pull {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

.toybox-tray {
  position: relative;
  min-width: 250px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-bottom: none;
  box-shadow: -4px -4px 0 rgba(9, 30, 74, 0.10);
}
/* fully hide the tucked-away tray so nothing peeks while closed */
.toybox:not(.open):not(.dragging) .toybox-tray {
  visibility: hidden;
  transition: visibility 0s linear 0.3s;   /* after the slide-shut finishes */
}

.toybox-tiles {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 30px 26px 34px;
}

/* the drawer's floor print — big, filling the whole drawer behind the toys */
.toybox-floor {
  position: absolute;
  inset: 0;
  z-index: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 44px;
  font-weight: 700;
  letter-spacing: 7px;
  line-height: 0.92;
  text-transform: uppercase;
  color: var(--chalk-dark);
  opacity: 0.55;
  pointer-events: none;
  user-select: none;
}

/* Toy objects — unnamed icons, rattling around loose in the drawer.
   Their resting spot is randomised (--dx/--dy/--rot) every time it opens. */
.toy-tile {
  width: 52px;
  height: 52px;
  display: grid;
  place-items: center;
  text-decoration: none;
  background: linear-gradient(160deg, #0B2554 0%, var(--navy-deep) 100%);
  border: 1px solid var(--navy-deep);
  border-radius: var(--radius);
  will-change: transform;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.toy-tile:hover,
.toy-tile:focus-visible {
  border-color: var(--gold);
  box-shadow: 3px 3px 0 var(--gold);
}
.toy-tile:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: 2px; }
.toy-tile svg { width: 32px; height: 32px; pointer-events: none; }


/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(9, 30, 74, 0.55);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.14s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  box-shadow: 6px 6px 0 var(--gold), 0 20px 50px rgba(9, 30, 74, 0.35);
  max-width: 400px;
  width: 100%;
  transform: translate(4px, 4px) scale(0.97);
  transition: transform 0.14s ease;
}
.modal-overlay.open .modal { transform: translate(0, 0) scale(1); }

.modal-header {
  background: var(--navy-deep);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-navy-dim);
}
.modal-close {
  background: transparent;
  border: 1px solid rgba(255, 210, 63, 0.4);
  color: var(--flame-yellow);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  cursor: pointer;
  width: 24px; height: 24px;
  display: grid; place-items: center;
  flex-shrink: 0;
  padding: 0; line-height: 1;
  transition: background 0.08s, border-color 0.08s;
}
.modal-close:hover { border-color: var(--flame-yellow); background: rgba(255, 210, 63, 0.1); }
.modal-close:focus-visible { outline: 2px solid var(--flame-yellow); outline-offset: 2px; }

.modal-body {
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  align-items: center;
  text-align: center;
}
.modal-icon { width: 48px; height: 48px; }
.modal-msg { font-size: 15px; color: var(--text-body); line-height: 1.5; }

.modal-email {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-primary);
  text-decoration: none;
  border: 1px solid var(--gold);
  background: var(--card-bg);
  padding: 10px 18px;
  display: inline-block;
  transition: transform 0.08s, box-shadow 0.08s, background 0.1s;
  box-shadow: 3px 3px 0 var(--gold);
}
.modal-email:hover {
  background: var(--ice);
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0 var(--gold);
}
.modal-email:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: 3px; }

.modal-dismiss {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--chalk-dark);
  color: var(--text-muted);
  cursor: pointer;
  padding: 8px 16px;
  border-radius: var(--radius);
  transition: border-color 0.1s, color 0.1s;
}
.modal-dismiss:hover { border-color: var(--steel); color: var(--text-primary); }
.modal-dismiss:focus-visible { outline: 2px solid var(--navy-mid); outline-offset: 2px; }

/* ── STATUSBAR / CONSOLE ── */
.statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  background: var(--navy-deep);
  border-top: 1px solid rgba(255, 210, 63, 0.25);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
  z-index: 100;
  overflow: hidden;
}
.status-dot {
  width: 7px; height: 7px;
  background: #2ECC71;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(46, 204, 113, 0.7);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}
.status-divider {
  width: 1px; height: 14px;
  background: rgba(255, 210, 63, 0.25);
  flex-shrink: 0;
}
.console-ticker {
  font-family: 'VT323', monospace;
  font-size: 16px;
  color: var(--text-navy-dim);
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  flex: 1;
}
.console-cursor {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--text-navy-dim);
  vertical-align: middle;
  margin-left: 2px;
  animation: cursor-blink 1s steps(1) infinite;
}
@keyframes cursor-blink {
  0%, 49%   { opacity: 1; }
  50%, 100% { opacity: 0; }
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  :root { --app-size: 128px; }
  .app-header { padding: 10px 12px; gap: 10px; min-height: 56px; }
  .app-title { font-size: 15px; letter-spacing: 4px; gap: 8px; padding-left: 4px; }
  .app-title::before, .app-title::after { width: 16px; }
  .header-clock { font-size: 14px; letter-spacing: 2px; }
  .desktop { padding: 32px 16px 80px; }
  .app-grid { gap: 16px; }
}
@media (max-width: 360px) {
  :root { --app-size: 112px; }
  .app-grid { gap: 12px; }
  .new-badge { font-size: 7px; padding: 4px 5px 3px; }
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── SR-ONLY ── */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
</style>
</head>
<body>

<a href="#main" class="skip-link">Skip to content</a>

<div id="liveRegion" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<!-- HEADER — family bar: GG brand + email · pixel title · clock -->
<header class="app-header" role="banner">
  <div class="header-left">
    <a
      class="brand-email-btn"
      href="mailto:nikitas@ggcity.org"
      aria-label="Contact nikitas@ggcity.org for troubleshooting and feedback"
    >
      <svg viewBox="0 0 16 12" aria-hidden="true">
        <rect x="0" y="0" width="16" height="12" fill="currentColor"/>
        <rect x="1" y="1" width="14" height="10" fill="var(--navy-deep)"/>
        <rect x="1" y="1" width="2" height="2" fill="currentColor"/>
        <rect x="3" y="2" width="2" height="2" fill="currentColor"/>
        <rect x="5" y="3" width="2" height="2" fill="currentColor"/>
        <rect x="7" y="4" width="2" height="2" fill="currentColor"/>
        <rect x="13" y="1" width="2" height="2" fill="currentColor"/>
        <rect x="11" y="2" width="2" height="2" fill="currentColor"/>
        <rect x="9" y="3" width="2" height="2" fill="currentColor"/>
        <rect x="1" y="9" width="2" height="2" fill="currentColor"/>
        <rect x="13" y="9" width="2" height="2" fill="currentColor"/>
      </svg>
    </a>
  </div>
  <div class="header-center">
    <h1 class="app-title">IT Toolbox</h1>
  </div>
  <div class="header-right">
    <div class="header-clock" id="clock" aria-label="Current time" role="timer"></div>
  </div>
</header>

<!-- MAIN -->
<main class="desktop" id="main" role="main">

<!-- MODAL -->
<div
  class="modal-overlay"
  id="modalOverlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modalTitle"
  aria-describedby="modalDesc"
>

    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Suggest a Tool</span>
      <button class="modal-close" id="modalClose" aria-label="Close dialog">X</button>
    </div>
    <div class="modal-body">

        <rect x="1" y="3" width="14" height="10" fill="none" stroke="#C8A84B" stroke-width="1"/>

        <polygon points="1,3 8,9 15,3" fill="none" stroke="#C8A84B" stroke-width="1"/>
        <rect x="2" y="4" width="5" height="1" fill="#1A4A96"/>

        <rect x="4" y="6" width="2" height="1" fill="#C8A84B" opacity="0.6"/>
        <rect x="10" y="6" width="2" height="1" fill="#C8A84B" opacity="0.6"/>
        <rect x="6" y="7" width="2" height="1" fill="#C8A84B" opacity="0.6"/>

      </p>

        href="mailto:nikitas@ggcity.org"
        aria-label="Send email to nikitas@ggcity.org"
      >
        nikitas@ggcity.org
      </a>

      <button class="modal-dismiss" id="modalDismiss">Close</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
}
updateClock();
setInterval(updateClock, 1000);

/* ── MODAL ── */
const overlay     = document.getElementById('modalOverlay');
const closeBtn    = document.getElementById('modalClose');
const dismissBtn  = document.getElementById('modalDismiss');
const placeholder = document.getElementById('placeholderBtn');
const liveRegion  = document.getElementById('liveRegion');

let lastFocused = null;

function openModal() {
  lastFocused = document.activeElement;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => closeBtn.focus(), 80);
  liveRegion.textContent = 'Dialog opened: Suggest a tool. Contact nikitas@ggcity.org';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  liveRegion.textContent = 'Dialog closed.';
  if (lastFocused) lastFocused.focus();
}

placeholder.addEventListener('click', openModal);
closeBtn.addEventListener('click', closeModal);
dismissBtn.addEventListener('click', closeModal);

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.classList.contains('open')) {
    closeModal();
  }
});

/* Focus trap inside modal */
overlay.addEventListener('keydown', (e) => {
  if (e.key !== 'Tab') return;
  const focusable = overlay.querySelectorAll(
    'button, a[href], input, [tabindex]:not([tabindex="-1"])'
  );
  const first = focusable[0];
  const last  = focusable[focusable.length - 1];
  if (e.shiftKey) {
    if (document.activeElement === first) {
      e.preventDefault();
      last.focus();
    }
  } else {
    if (document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }
});

/* ── CONSOLE TICKER ── */
const CONSOLE_MESSAGES = [
  'GGing...',
  'Calling Moo...',
  'Snacking on strawberries...',
  'Gems Gems',
  'Evaluating new building',
];

const consoleLine = document.getElementById('consoleLine');
let msgIndex = 0;
let charIndex = 0;

function typeNextChar() {
  const msg = CONSOLE_MESSAGES[msgIndex];
  if (charIndex < msg.length) {
    consoleLine.textContent = '> ' + msg.slice(0, charIndex + 1);
    charIndex++;
    setTimeout(typeNextChar, 38 + Math.random() * 28);
  } else {
    setTimeout(() => {
      charIndex = 0;
      msgIndex = (msgIndex + 1) % CONSOLE_MESSAGES.length;
      consoleLine.textContent = '';
      setTimeout(typeNextChar, 200);
    }, 3200);
  }
}

if (CONSOLE_MESSAGES.length > 0) {
  setTimeout(typeNextChar, 800);
}

/* ── SNACK SHACK drawer: click toggles, or genuinely pull it up ── */
const toybox = document.getElementById('toybox');
const toyHandle = document.getElementById('toyboxHandle');

/* Pool-ball physics: toys carry velocity, spin, and momentum; they bounce off
   the drawer walls and each other, then glide to rest. Every open is a fresh
   break, and dragging the drawer itself rattles them. */
const toyArena = document.querySelector('.toybox-tiles');
const toyReduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const toyBodies = [];
let toyRaf = 0, toyLast = 0;

function toyInitBodies() {
  toyBodies.length = 0;
  document.querySelectorAll('.toy-tile').forEach(el => {
    const r = el.offsetWidth / 2;
    toyBodies.push({
      el, r,
      bx: el.offsetLeft + r, by: el.offsetTop + r,   // home centre from layout
      x: 0, y: 0, vx: 0, vy: 0,                      // offset + velocity
      th: 0, w: 0,                                   // angle + spin
    });
  });
}

function toyStep(now) {
  const dt = Math.min(Math.max((now - toyLast) / 1000, 0.001), 0.032);
  toyLast = now;
  const W = toyArena.clientWidth, H = toyArena.clientHeight, M = 2;
  let alive = false;

  for (const b of toyBodies) {
    // felt friction + a soft spring that woobles the angle back upright
    b.vx *= Math.max(0, 1 - 1.6 * dt);
    b.vy *= Math.max(0, 1 - 1.6 * dt);
    b.w  += (-30 * b.th - 6 * b.w) * dt;
    b.x  += b.vx * dt;
    b.y  += b.vy * dt;
    b.th += b.w * dt;

    // cushion bounces
    const cx = b.bx + b.x, cy = b.by + b.y;
    if (cx < b.r + M)     { b.x += (b.r + M) - cx;     b.vx =  Math.abs(b.vx) * 0.78; b.w += b.vy * 0.015; }
    if (cx > W - b.r - M) { b.x -= cx - (W - b.r - M); b.vx = -Math.abs(b.vx) * 0.78; b.w -= b.vy * 0.015; }
    if (cy < b.r + M)     { b.y += (b.r + M) - cy;     b.vy =  Math.abs(b.vy) * 0.78; b.w -= b.vx * 0.015; }
    if (cy > H - b.r - M) { b.y -= cy - (H - b.r - M); b.vy = -Math.abs(b.vy) * 0.78; b.w += b.vx * 0.015; }
  }

  // toy-on-toy collisions: equal-mass impulse along the contact normal
  for (let i = 0; i < toyBodies.length; i++) {
    for (let j = i + 1; j < toyBodies.length; j++) {
      const a = toyBodies[i], c = toyBodies[j];
      const dx = (c.bx + c.x) - (a.bx + a.x);
      const dy = (c.by + c.y) - (a.by + a.y);
      const dist = Math.hypot(dx, dy) || 0.001, min = a.r + c.r;
      if (dist >= min) continue;
      const nx = dx / dist, ny = dy / dist, push = (min - dist) / 2;
      a.x -= nx * push; a.y -= ny * push;
      c.x += nx * push; c.y += ny * push;
      const rvx = c.vx - a.vx, rvy = c.vy - a.vy;
      const vn = rvx * nx + rvy * ny;
      if (vn < 0) {
        const imp = -(1 + 0.85) * vn / 2;
        a.vx -= imp * nx; a.vy -= imp * ny;
        c.vx += imp * nx; c.vy += imp * ny;
        const vt = rvx * -ny + rvy * nx;         // tangential graze → spin
        a.w -= vt * 0.02; c.w += vt * 0.02;
      }
    }
  }

  for (const b of toyBodies) {
    if (Math.abs(b.vx) > 3 || Math.abs(b.vy) > 3 || Math.abs(b.w) > 0.06 || Math.abs(b.th) > 0.01) alive = true;
    b.el.style.transform = 'translate(' + b.x.toFixed(1) + 'px,' + b.y.toFixed(1) + 'px) rotate(' + b.th.toFixed(3) + 'rad)';
  }
  toyRaf = alive ? requestAnimationFrame(toyStep) : 0;
}

function toyWake() {
  if (!toyRaf && !toyReduce) { toyLast = performance.now(); toyRaf = requestAnimationFrame(toyStep); }
}

function toyBreak() {                            // the drawer flies open — rack 'em
  if (toyReduce) return;
  toyInitBodies();
  for (const b of toyBodies) {
    b.vx = (Math.random() - 0.5) * 560;
    b.vy = 220 + Math.random() * 280;            // slammed against the near cushion
    b.w  = (Math.random() - 0.5) * 10;
  }
  toyWake();
}

function toyRattle(kick) {                       // drawer motion shoves the toys
  if (toyReduce || !toyBodies.length) return;
  for (const b of toyBodies) b.vy -= kick * (0.8 + Math.random() * 0.4);
  toyWake();
}

function toySetOpen(o) {
  toybox.classList.toggle('open', o);
  toybox.style.transform = '';
  toyHandle.setAttribute('aria-expanded', String(o));
  if (o) toyBreak();
  else {
    if (toyRaf) { cancelAnimationFrame(toyRaf); toyRaf = 0; }
    toyBodies.forEach(b => { b.el.style.transform = ''; });
    toyBodies.length = 0;
  }
}

let toyDrag = null;
toyHandle.addEventListener('pointerdown', (e) => {
  toyDrag = { startY: e.clientY, moved: false, wasOpen: toybox.classList.contains('open') };
  try { toyHandle.setPointerCapture(e.pointerId); } catch (err) { /* synthetic pointers */ }
});
toyHandle.addEventListener('pointermove', (e) => {
  if (!toyDrag) return;
  const dy = toyDrag.startY - e.clientY;                     // pulling up = positive
  if (Math.abs(dy) > 5) toyDrag.moved = true;
  if (!toyDrag.moved) return;
  const closedOffset = toybox.offsetHeight - 26;             // tray height hidden when closed
  const base = toyDrag.wasOpen ? 0 : closedOffset;
  const current = Math.min(closedOffset, Math.max(0, base - dy));
  toybox.classList.add('dragging');
  toybox.style.transform = 'translateY(' + current + 'px)';
  if (!toyBodies.length) toyInitBodies();
  if (toyDrag.prev !== undefined) toyRattle((toyDrag.prev - current) * 24);   // momentum from the pull
  toyDrag.prev = current;
  toyDrag.current = current;
  toyDrag.closedOffset = closedOffset;
});
function toyRelease() {
  if (!toyDrag) return;
  toybox.classList.remove('dragging');
  if (toyDrag.moved) toySetOpen(toyDrag.current < toyDrag.closedOffset / 2);
  else toySetOpen(!toyDrag.wasOpen);                         // plain click toggles
  toyDrag = null;
}
toyHandle.addEventListener('pointerup', toyRelease);
toyHandle.addEventListener('pointercancel', toyRelease);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && toybox.classList.contains('open') && !overlay.classList.contains('open')) {
    toySetOpen(false);
  }
});

/* Selected state on click */
document.querySelectorAll('.app-icon:not(.placeholder)').forEach(icon => {
  icon.addEventListener('click', function() {
    document.querySelectorAll('.app-icon').forEach(i => i.classList.remove('selected'));
    this.classList.add('selected');
  });
});
</script>
</body>
